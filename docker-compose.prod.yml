# docker-compose.prod.yml — PRODUCTION stack
#
# Usage:
#   docker compose -f docker-compose.prod.yml up -d --build
#
# Required: create a .env.prod file next to this file with all secrets.
# See .env.example for the full list of variables.
#
# Architecture:
#   nginx  → serves React SPA on :80/:443, proxies /api/ + /admin/ to backend
#   backend → Django + Gunicorn on internal port 8000
#   db     → PostgreSQL (or use a managed DB and remove this service)

services:
  db:
    image: postgres:17-alpine
    restart: always
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    # Do NOT expose port 5432 in production — keep DB internal only

  backend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        # Pass the production API URL so the frontend build embeds it
        VITE_API_URL: ${VITE_API_URL:-/api}
    restart: always
    env_file: .env.prod
    environment:
      DB_HOST: db
    depends_on:
      db:
        condition: service_healthy
    volumes:
      # Persist media uploads when NOT using S3
      - media_data:/app/media
    expose:
      - "8000"
    command: >
      sh -c "python manage.py migrate --noinput &&
             gunicorn FarmMoo.wsgi:application
             --bind 0.0.0.0:8000
             --workers ${GUNICORN_WORKERS:-3}
             --timeout 120
             --access-logfile -
             --error-logfile -"

  nginx:
    image: nginx:1.27-alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      # Share built frontend from backend image via named volume
      - frontend_dist:/usr/share/nginx/html:ro
      - media_data:/app/media:ro
      # TLS certificates (managed externally, e.g. Certbot / Let's Encrypt)
      - ./nginx/certs:/etc/nginx/certs:ro
    depends_on:
      - backend

volumes:
  postgres_data:
  media_data:
  frontend_dist:
