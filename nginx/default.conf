server {
    listen 80;
    server_name _;

    # ── Redirect HTTP → HTTPS ───────────────────────────────────────────────
    # Uncomment after obtaining TLS certificates:
    # return 301 https://$host$request_uri;

    # ── Gzip ────────────────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/json
        application/javascript
        application/x-javascript
        image/svg+xml
        font/woff
        font/woff2;
    gzip_min_length 1024;

    # ── React SPA ────────────────────────────────────────────────────────────
    root /usr/share/nginx/html;
    index index.html;

    # All non-API routes fall through to index.html (client-side routing)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Immutable cache for Vite hashed assets (JS/CSS bundles)
    location ~* \.(js|css|woff|woff2|ttf|eot|ico|svg|png|jpg|jpeg|gif|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ── Django API ───────────────────────────────────────────────────────────
    location /api/ {
        proxy_pass         http://backend:8000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;

        # Security: strip internal headers before forwarding
        proxy_hide_header  X-Powered-By;
    }

    # ── Django Admin ─────────────────────────────────────────────────────────
    location /admin/ {
        proxy_pass         http://backend:8000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── Django-collected static files (served by WhiteNoise, but nginx is faster)
    location /static/ {
        proxy_pass http://backend:8000;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ── Uploaded media files (when USE_S3=False) ─────────────────────────────
    # When USE_S3=True, remove this block — S3 serves /media/ directly.
    location /media/ {
        alias /app/media/;
        expires 7d;
        add_header Cache-Control "public";
    }

    # ── Security headers ─────────────────────────────────────────────────────
    add_header X-Content-Type-Options  nosniff       always;
    add_header X-Frame-Options         DENY          always;
    add_header Referrer-Policy         strict-origin-when-cross-origin always;

    # Limit upload size (match Django's DATA_UPLOAD_MAX_MEMORY_SIZE)
    client_max_body_size 10M;
}

