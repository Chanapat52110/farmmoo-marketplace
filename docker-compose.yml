# docker-compose.yml — LOCAL DEVELOPMENT helper
#
# Purpose: spin up a PostgreSQL instance so you can test with a real DB
# without installing Postgres natively.
#
# Usage:
#   docker compose up -d db          # start Postgres in background
#   python manage.py runserver        # run Django on the host as normal
#   npm run dev  (in frontend/)       # run Vite dev server on the host
#
# Then update your .env:
#   DB_ENGINE=django.db.backends.postgresql
#   DB_NAME=farmmoo
#   DB_USER=farmmoo
#   DB_PASSWORD=farmmoo_dev
#   DB_HOST=127.0.0.1
#   DB_PORT=5432

services:
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: farmmoo
      POSTGRES_USER: farmmoo
      POSTGRES_PASSWORD: farmmoo_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U farmmoo"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
